<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="GrizCam synthetic analytics demo for Yellowstone 2025 event reporting and wildlife activity exploration."
    />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" href="/brand/favicon.png" />
    <link rel="apple-touch-icon" href="/brand/favicon.png" />
    <title>GrizCam Demo | Yellowstone 2025 Analytics</title>
    <script>
      // Apply persisted theme before React mounts to avoid FOUC.
      (function () {
        try {
          var t = localStorage.getItem("grizcam.theme");
          if (t === "dark") document.documentElement.setAttribute("data-theme", "dark");
        } catch (_) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
  </html>
